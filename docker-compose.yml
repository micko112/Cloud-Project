services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cloud-net

  app:
    build: ./app
    ports:
      - "${PORT}:3000"
    env_file: .env
    depends_on:
      - db
    networks:
      - cloud-net

networks:
  cloud-net:
    driver: bridge

volumes:
  pgdata: